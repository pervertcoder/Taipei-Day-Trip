<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/style_reset.css" />
    <link rel="stylesheet" href="/static/booking.css" />
    <title>Booking</title>
  </head>
  <body>
    <script src="https://js.tappaysdk.com/sdk/tpdirect/v5.14.0" defer></script>
    <script src="/static/booking.js" defer></script>
    <div class="container">
      <div class="topbar topbar__container--whole">
        <div class="topbar__left--title">
          <p class="homepage__title clickE">台北一日遊</p>
        </div>
        <div class="topbar__container--right">
          <button
            class="topbar__right--booking topbar__title--font button_like"
          >
            預定行程
          </button>
          <button
            class="loginButton pop topbar__right--login topbar__title--font button_like"
          >
            登入/註冊
          </button>
        </div>
      </div>
      <div class="seperateLine deleteLine"></div>
      <div class="title">
        <h1 class="title__inside font__style1"></h1>
      </div>
      <div class="emptyMessage state__off">
        <p class="scheduleState font__style2"></p>
      </div>
      <div class="attraction__info state__off">
        <div class="schedule__info">
          <div class="image__left">
            <img class="atImg" src="" alt="photo" />
          </div>
          <div class="info__right">
            <div class="attraction__title--outside">
              <p class="topLine--name">台北一日遊：</p>
              <p class="attraction__title"></p>
            </div>
            <div class="attraction__date--outside">
              <p class="topLine">日期：</p>
              <p class="attraction__date"></p>
            </div>
            <div class="attraction__time--outside">
              <p class="topLine">時間：</p>
              <p class="attraction__time"></p>
            </div>
            <div class="attraction__price--outside">
              <p class="topLine">費用：</p>
              <p class="attraction__price"></p>
            </div>
            <div class="attraction__address--outside">
              <p class="topLine">地點：</p>
              <p class="attraction__address"></p>
            </div>
          </div>
          <div class="deleteBtn">
            <button type="button" id="delete"></button>
          </div>
        </div>
      </div>
      <div class="seperateLine__inside state__off"></div>
      <div class="access state__off">
        <h1 class="accessH1 font__style1">您的聯絡資訊</h1>
        <div class="access__inside">
          <p>聯絡姓名：</p>
          <input type="text" id="userName" />
        </div>
        <div class="access__inside">
          <p>聯絡信箱：</p>
          <input type="email" id="email" />
        </div>
        <div class="access__inside">
          <p>手機號碼：</p>
          <input type="text" id="phone" />
        </div>
        <div class="access__inside">
          <p>
            請保持手機暢通，準時到達，導覽人員將用手機與您聯繫，務必留下正確的聯絡方式。
          </p>
        </div>
      </div>
      <div class="seperateLine__inside state__off"></div>
      <div class="credit state__off" id="credit">
        <h1 class="creditH1 font__style1">信用卡付款資訊</h1>
        <div class="tpfield" id="card-number"></div>
        <div class="tpfield" id="card-expiration-date"></div>
        <div class="tpfield" id="card-ccv"></div>
        <!-- <div class="credit__inside">
          <p>卡片號碼：</p>
          <input type="text" id="creditNum" placeholder="**** **** **** ****" />
        </div>
        <div class="credit__inside">
          <p>過期時間：</p>
          <input type="text" id="exp" placeholder="MM/YY" />
        </div>
        <div class="credit__inside">
          <p>驗證密碼：</p>
          <input type="password" id="password" placeholder="CVV" />
        </div> -->
      </div>
      <div class="seperateLine__inside state__off"></div>
      <div class="payCheck state__off">
        <div class="priceShell">
          <p class="priceCheck"></p>
        </div>
        <button type="button" class="comfirmBtn">確認訂購並付款</button>
      </div>
    </div>
    <footer class="footer footer__structure footer__layout footer__height--off">
      <p>COPYRIGHT © 2021 台北一日遊</p>
    </footer>
  </body>
</html>
